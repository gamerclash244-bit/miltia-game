<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>BaylerBay Ops - Secure Login</title>
  <style>
    body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Arial', sans-serif; touch-action: none; }
    #gameCanvas { display: none; cursor: crosshair; }
    .menu-screen { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(20, 25, 30, 0.95); display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; text-align: center; z-index: 10; }
    h1 { font-size: 3rem; margin-bottom: 10px; text-transform: uppercase; color: #55efc4; }
    .death-title { color: #ff4757; font-size: 4rem; }
    button.ui-btn { padding: 15px 40px; font-size: 1.2rem; background-color: #ff4757; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; margin: 10px; width: 250px; }
    button.ui-btn:active { background-color: #ff6b81; }
    button.ui-btn.secondary { background-color: #34495e; }
    button.ui-btn.secondary:active { background-color: #7f8c8d; }
    .setting-group { margin: 20px 0; display: flex; flex-direction: column; align-items: center; }
    input[type="text"], input[type="password"] { padding: 15px; font-size: 1.2rem; border-radius: 5px; border: none; text-align: center; width: 250px; font-weight: bold; margin-bottom: 10px;}
    .color-picker { display: flex; gap: 15px; margin-top: 10px; }
    .color-btn { width: 40px; height: 40px; border-radius: 50%; border: 3px solid transparent; cursor: pointer; }
    .color-btn.selected { border-color: white; transform: scale(1.1); }
    
    #leaderboardPanel {
      position: absolute; right: 20px; top: 50%; transform: translateY(-50%); width: 320px;
      background: rgba(30, 40, 50, 0.9); border: 2px solid #f1c40f; border-radius: 10px;
      padding: 20px; color: white; z-index: 20; display: none; box-shadow: 0 0 15px rgba(241, 196, 15, 0.3);
    }
    .lb-table { width: 100%; border-collapse: collapse; text-align: left; font-size: 0.9rem; }
    .lb-table th { border-bottom: 2px solid #555; padding-bottom: 8px; color: #bdc3c7; }
    .lb-table td { padding: 8px 0; border-bottom: 1px solid #333; }
    .lb-rank { font-weight: bold; color: #f1c40f; width: 30px; }
    
    @media (max-width: 800px) {
      #leaderboardPanel { position: relative; right: auto; top: auto; transform: none; margin-top: 20px; width: 90%; max-width: 320px; }
    }
  </style>
</head>
<body>

  <div id="loginScreen" class="menu-screen">
    <h1>Database Uplink</h1>
    <p id="loginStatus" style="color: #f1c40f; font-weight: bold;">Connecting to server...</p>
    <div class="setting-group">
      <input type="text" id="loginName" placeholder="Callsign" maxlength="12">
      <input type="password" id="loginPin" placeholder="Secret PIN" maxlength="8">
    </div>
    <button id="authBtn" class="ui-btn" style="display: none;">Verify & Link</button>
  </div>

  <div id="leaderboardPanel">
    <h3 style="margin-top: 0; color: #f1c40f; text-align: center; text-transform: uppercase;">Top Operators</h3>
    <table class="lb-table">
      <thead><tr><th>Callsign</th><th style="text-align: center;" title="Highest Kills in a Single Life">1-Life</th><th style="text-align: right;">Total</th></tr></thead>
      <tbody id="leaderboardBody"><tr><td colspan="3" style="text-align:center; padding-top: 15px;">Loading data...</td></tr></tbody>
    </table>
  </div>

  <div id="mainMenu" class="menu-screen" style="display: none;">
    <h1>BaylerBay Ops</h1>
    <p style="font-size: 0.9rem; color: #bdc3c7;">PC: WASD + Mouse | Mobile: Touch Joysticks</p>
    <button id="playBtn" class="ui-btn">Deploy Online</button>
    <button id="settingsBtn" class="ui-btn secondary">Armor Config</button>
  </div>

  <div id="settingsMenu" class="menu-screen" style="display: none;">
    <h1 style="color: #f1c40f;">Armor Config</h1>
    <div class="setting-group">
      <label style="margin-bottom: 5px; font-weight: bold;">SELECT COLOR:</label>
      <div class="color-picker">
        <div class="color-btn selected" data-color="#e74c3c" style="background-color: #e74c3c;"></div>
        <div class="color-btn" data-color="#2ecc71" style="background-color: #2ecc71;"></div>
        <div class="color-btn" data-color="#3498db" style="background-color: #3498db;"></div>
        <div class="color-btn" data-color="#f1c40f" style="background-color: #f1c40f;"></div>
      </div>
    </div>
    <button id="saveSettingsBtn" class="ui-btn">Save & Return</button>
  </div>

  <div id="deathScreen" class="menu-screen" style="display: none;">
    <h1 class="death-title">K.I.A.</h1>
    <h2 id="finalKillsText" style="margin-bottom: 30px; color: #f1c40f;">Streak: 0</h2>
    <button id="respawnBtn" class="ui-btn">Respawn</button>
    <button id="backMenuBtn" class="ui-btn secondary">Main Menu</button>
  </div>

  <canvas id="gameCanvas"></canvas>

  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

  <script>
    const menus = { 
      login: document.getElementById('loginScreen'),
      main: document.getElementById('mainMenu'), 
      settings: document.getElementById('settingsMenu'), 
      death: document.getElementById('deathScreen') 
    };
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const leaderboardPanel = document.getElementById('leaderboardPanel');
    
    const authBtn = document.getElementById('authBtn');
    const playBtn = document.getElementById('playBtn'); const settingsBtn = document.getElementById('settingsBtn');
    const saveSettingsBtn = document.getElementById('saveSettingsBtn'); const respawnBtn = document.getElementById('respawnBtn');
    const backMenuBtn = document.getElementById('backMenuBtn'); 
    const colorBtns = document.querySelectorAll('.color-btn');

    let socket = null; let networkPlayers = {}; let networkBullets = []; let isOnline = false; let lastSyncTime = 0; 
    const worldWidth = 10000; const worldHeight = 2500; const camera = { x: 0, y: 0 };
    let map = []; let powerups = []; 

    const joyLeft = { active: false, startX: 0, startY: 0, dx: 0, dy: 0, touchId: null };
    const joyRight = { active: false, startX: 0, startY: 0, dx: 0, dy: 0, touchId: null };
    let mouseX = canvas.width / 2; let mouseY = canvas.height / 2;

    const biomes = [
      { name: "GREENLANDS", endX: 2000, sky: [135, 206, 235], ground: "#55efc4", pType: "pollen", pColor: "rgba(255,255,255,0.6)" },
      { name: "SAVANNA", endX: 4000, sky: [230, 126, 34], ground: "#d35400", pType: "dust", pColor: "rgba(211,84,0,0.5)" },
      { name: "ASH WASTELAND", endX: 6000, sky: [44, 62, 80], ground: "#7f8c8d", pType: "ash", pColor: "rgba(30,30,30,0.8)" },
      { name: "FROST PEAKS", endX: 8000, sky: [176, 224, 230], ground: "#ecf0f1", pType: "snow", pColor: "rgba(255,255,255,0.9)" },
      { name: "THE VOID", endX: 10000, sky: [20, 0, 35], ground: "#8e44ad", pType: "spark", pColor: "rgba(155,89,182,0.8)" }
    ];
    let targetBiome = biomes[0]; let currentSky = [...targetBiome.sky]; let biomePopupName = targetBiome.name; let biomePopupOpacity = 0; 
    
    let particles = []; const maxParticles = 50; 

    const myPlayer = {
      x: 100, y: worldHeight - 200, width: 40, height: 40, dx: 0, dy: 0, speed: 6, jetpackForce: 0.9, gravity: 0.35, aimAngle: 0, 
      health: 100, maxHealth: 100, fuel: 250, maxFuel: 250, ammo: 15, maxAmmo: 15, isReloading: false, reloadStartTime: 0, reloadDuration: 1500, lastShotTime: 0,
      name: "Unknown", color: "#e74c3c", kills: 0, unlimitedFuelTimer: 0, lastX: 0, lastY: 0, lastAim: 0, lastHealth: 100
    };
    let isPlaying = false; let bullets = []; const keys = { w: false, a: false, d: false, fire: false };

    // --- NETWORK CONNECTION ---
    function initNetwork() {
      // >>> PASTE YOUR RENDER URL HERE <<<
      const myRenderURL = "https://YOUR_RENDER_URL_HERE.onrender.com"; 
      const loginStatus = document.getElementById('loginStatus');

      if (typeof io === 'undefined') { loginStatus.innerText = "Error: Blocked by browser."; loginStatus.style.color = "#e74c3c"; return; }
      if(socket) return; 
      
      loginStatus.innerText = "Waking up server... (Can take 50 seconds)"; loginStatus.style.color = "#f39c12";

      try {
        socket = io(myRenderURL, { reconnectionAttempts: 12, reconnectionDelay: 5000 }); 
        
        socket.on('connect', () => { 
          isOnline = true; 
          loginStatus.innerText = "Server Online. Please Authenticate."; 
          loginStatus.style.color = "#2ecc71"; 
          authBtn.style.display = "block"; 
        });

        socket.on('newPlayer', (playerInfo) => { 
          networkPlayers[playerInfo.id] = playerInfo.player; 
          networkPlayers[playerInfo.id].targetX = playerInfo.player.x; 
          networkPlayers[playerInfo.id].targetY = playerInfo.player.y; 
        });
        
        socket.on('playerMoved', (playerInfo) => { 
          if(networkPlayers[playerInfo.id]) { 
            networkPlayers[playerInfo.id].targetX = playerInfo.player.x; 
            networkPlayers[playerInfo.id].targetY = playerInfo.player.y; 
            networkPlayers[playerInfo.id].aimAngle = playerInfo.player.aimAngle; 
            networkPlayers[playerInfo.id].health = playerInfo.player.health; 
          } 
        });
        
        socket.on('networkBullet', (b) => { networkBullets.push(b); });
        socket.on('playerDisconnected', (id) => { delete networkPlayers[id]; });
        socket.on('reconnect_failed', () => { loginStatus.innerText = "Server unreachable."; loginStatus.style.color = "#e74c3c"; isOnline = false; });
        
        socket.on('leaderboardUpdate', (topPlayers) => {
          let html = '';
          topPlayers.forEach((p, index) => {
            let trophy = index === 0 ? '👑' : (index + 1) + '.';
            html += `<tr><td class="lb-rank">${trophy}</td><td>${p.name}</td><td style="text-align: center; color: #55efc4; font-weight: bold;">${p.bestStreak}</td><td style="text-align: right;">${p.totalKills}</td></tr>`;
          });
          if(topPlayers.length === 0) html = '<tr><td colspan="4" style="text-align:center;">No kills yet.</td></tr>';
          document.getElementById('leaderboardBody').innerHTML = html;
        });
      } catch (err) { loginStatus.innerText = "Network Error."; isOnline = false; }
    }

    initNetwork();

    // --- SECURE AUTHENTICATION LOGIC ---
    authBtn.addEventListener('click', () => {
      const name = document.getElementById('loginName').value.trim();
      const pin = document.getElementById('loginPin').value.trim();
      const status = document.getElementById('loginStatus');

      if(!name || !pin) { status.innerText = "Callsign and PIN required."; status.style.color = "#e74c3c"; return; }
      
      status.innerText = "Verifying Credentials..."; status.style.color = "#f1c40f";

      socket.emit('login', { name: name, pin: pin }, (res) => {
        if(res.success) {
          myPlayer.name = name;
          // Load existing players into memory so we can see them
          networkPlayers = res.currentPlayers; 
          delete networkPlayers[socket.id];
          for(let id in networkPlayers) { 
            networkPlayers[id].targetX = networkPlayers[id].x; 
            networkPlayers[id].targetY = networkPlayers[id].y; 
          }
          // Login successful, proceed to main menu!
          menus.login.style.display = 'none';
          menus.main.style.display = 'flex';
          leaderboardPanel.style.display = 'block';
        } else {
          status.innerText = res.message;
          status.style.color = "#e74c3c";
        }
      });
    });

    settingsBtn.addEventListener('click', () => { menus.main.style.display = 'none'; menus.settings.style.display = 'flex'; leaderboardPanel.style.display = 'none'; });
    colorBtns.forEach(btn => { btn.addEventListener('click', (e) => { colorBtns.forEach(b => b.classList.remove('selected')); e.target.classList.add('selected'); myPlayer.color = e.target.dataset.color; }); });
    saveSettingsBtn.addEventListener('click', () => { menus.settings.style.display = 'none'; menus.main.style.display = 'flex'; leaderboardPanel.style.display = 'block'; });
    
    playBtn.addEventListener('click', () => { menus.main.style.display = 'none'; leaderboardPanel.style.display = 'none'; canvas.style.display = 'block'; resetRun(); if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen().catch(e => {}); });
    backMenuBtn.addEventListener('click', () => { menus.death.style.display = 'none'; menus.main.style.display = 'flex'; leaderboardPanel.style.display = 'block'; });
    respawnBtn.addEventListener('click', () => { menus.death.style.display = 'none'; leaderboardPanel.style.display = 'none'; canvas.style.display = 'block'; resetRun(); });

    function resetRun() {
      isPlaying = true; myPlayer.x = 100; myPlayer.y = worldHeight - 200; myPlayer.dx = 0; myPlayer.dy = 0; myPlayer.health = myPlayer.maxHealth; myPlayer.fuel = myPlayer.maxFuel; myPlayer.ammo = myPlayer.maxAmmo; myPlayer.isReloading = false; myPlayer.kills = 0; myPlayer.unlimitedFuelTimer = 0; bullets = []; networkBullets = []; targetBiome = biomes[0]; currentSky = [...targetBiome.sky]; biomePopupName = "DEPLOYED"; biomePopupOpacity = 2.5; joyLeft.active = false; joyRight.active = false; keys.fire = false; keys.a = false; keys.d = false; keys.w = false; buildMap(); initParticles(); gameLoop();
    }

    function killPlayer() {
      isPlaying = false; myPlayer.health = 0; 
      if(isOnline && socket && socket.connected) {
        socket.emit('playerMovement', { x: myPlayer.x, y: myPlayer.y, aimAngle: myPlayer.aimAngle, color: myPlayer.color, name: myPlayer.name, health: 0 });
        socket.emit('updateScore', { name: myPlayer.name, kills: myPlayer.kills });
      }
      joyLeft.active = false; joyRight.active = false; keys.fire = false; keys.a = false; keys.d = false; keys.w = false;
      document.getElementById('finalKillsText').innerText = `Your Streak: ${myPlayer.kills}`;
      canvas.style.display = 'none'; menus.death.style.display = 'flex'; leaderboardPanel.style.display = 'block';
    }

    function initParticles() { particles = []; for(let i=0; i<maxParticles; i++) particles.push({ x: Math.random() * canvas.width, y: Math.random() * canvas.height, size: Math.random() * 3 + 1, vx: 0, vy: 0, driftOffset: Math.random() * 100 }); }
    function updateParticles() { let time = Date.now() * 0.002; for (let p of particles) { if (targetBiome.pType === "pollen") { p.vy = -0.5; p.vx = Math.sin(time + p.driftOffset) * 0.5; } else if (targetBiome.pType === "dust") { p.vy = 0; p.vx = 4 + Math.random() * 2; } else if (targetBiome.pType === "ash") { p.vy = 3; p.vx = 0.5; } else if (targetBiome.pType === "snow") { p.vy = 1.5; p.vx = Math.sin(time + p.driftOffset) * 1.5; } else if (targetBiome.pType === "spark") { p.vy = -2; p.vx = 0; } p.x += p.vx; p.y += p.vy; if (p.y > canvas.height + 10) p.y = -10; if (p.y < -10) p.y = canvas.height + 10; if (p.x > canvas.width + 10) p.x = -10; if (p.x < -10) p.x = canvas.width + 10; } }
    function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; initParticles(); }
    window.addEventListener('resize', resizeCanvas); resizeCanvas();

    function mulberry32(a) { return function() { var t = a += 0x6D2B79F5; t = Math.imul(t ^ t >>> 15, t | 1); t ^= t + Math.imul(t ^ t >>> 7, t | 61); return ((t ^ t >>> 14) >>> 0) / 4294967296; } }
    function buildMap() { map = [ { x: -50, y: 0, w: 50, h: worldHeight, type: "wall" }, { x: worldWidth, y: 0, w: 50, h: worldHeight, type: "wall" }, { x: 0, y: -50, w: worldWidth, h: 50, type: "wall" }, { x: 0, y: worldHeight - 50, w: worldWidth, h: 50, type: "floor" } ]; powerups = []; let currentX = 300; let rand = mulberry32(12345); while (currentX < worldWidth - 500) { let platWidth = 150 + rand() * 300; let platY = worldHeight - 150 - (rand() * 600); map.push({ x: currentX, y: platY, w: platWidth, h: 30, type: "plat" }); if (rand() > 0.6) { let cw = 40 + rand() * 30
